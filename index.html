<script type="module">
import React, { useState, useMemo, useEffect } from 'react';
import { createRoot } from 'react-dom/client';
import { LineChart, Line, AreaChart, Area, BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, ReferenceLine, CartesianGrid } from 'recharts';
import htm from 'htm';
const html = htm.bind(React.createElement);

/* ---------- shared fake-but-consistent model ---------- */

const fmtUSD = (n, d=0) => '$' + (n ?? 0).toLocaleString('en-US', { maximumFractionDigits:d, minimumFractionDigits:d });
const fmtNum = (n, d=0) => (n ?? 0).toLocaleString('en-US', { maximumFractionDigits:d, minimumFractionDigits:d });
const fmtPct = (n, d=1) => (n ?? 0).toFixed(d) + '%';

// Hourly ERCOT-like price curve ($/MWh). Nightly trough, morning climb, late-afternoon peak.
const hourlyPrice = (h) => {
  const base = 45;
  const shape = -18*Math.cos((h-4)*Math.PI/12) + 22*Math.exp(-Math.pow((h-18)/2.2, 2));
  const noise = Math.sin(h*1.7)*3;
  return Math.max(10, base + shape + noise);
};
const dayPrices = Array.from({length:24}, (_,h)=>({ h, price: hourlyPrice(h) }));

// Economics model
function computeEconomics(p) {
  const { batteryKwh, capexPerKwh, cyclesPerDay, daysPerYear, spread, rte, omPerKwhPerYear, gridServicesPerKwhYr, numShares, years, pricePerShare } = p;
  const capex = batteryKwh * capexPerKwh;
  const throughputKwhYr = batteryKwh * cyclesPerDay * daysPerYear * rte;
  const arbitrageRev   = throughputKwhYr * spread;
  const gridRev        = batteryKwh * gridServicesPerKwhYr;
  const omCost         = batteryKwh * omPerKwhPerYear;
  const netAnnual      = arbitrageRev + gridRev - omCost;
  const paybackYrs     = capex / Math.max(netAnnual, 1);
  const investorCapex  = numShares * pricePerShare;
  const perShareYr     = netAnnual / numShares;
  const yieldPct       = (perShareYr / pricePerShare) * 100;
  // 10y cashflow w/ 2%/yr degradation
  const cashflow = [];
  let cum = -capex;
  for (let y=1; y<=years; y++) {
    const degrade = Math.pow(0.98, y-1);
    const yrNet = netAnnual * degrade;
    cum += yrNet;
    cashflow.push({ year: y, net: yrNet, cumulative: cum });
  }
  // crude IRR from cashflow sign change
  const terminal = capex * 0.3; // salvage ~30%
  const irr = estimateIRR([-capex, ...cashflow.map(c=>c.net).slice(0,-1), cashflow[cashflow.length-1].net + terminal]);
  return { capex, throughputKwhYr, arbitrageRev, gridRev, omCost, netAnnual, paybackYrs, investorCapex, perShareYr, yieldPct, cashflow, irr };
}
function estimateIRR(cfs) {
  let lo=-0.5, hi=1.0;
  const npv = r => cfs.reduce((s,c,i)=> s + c/Math.pow(1+r,i), 0);
  for (let i=0;i<60;i++) { const m=(lo+hi)/2; if (npv(m)>0) lo=m; else hi=m; }
  return (lo+hi)/2;
}

/* ---------- UI atoms ---------- */

    ${sub && html`<div class="text-muted text-xs mt-1">${sub}</div>`}
  </div>`;

const Slider = ({ label, value, setValue, min, max, step, suffix, fmt }) => html`
  <div>
    <div class="flex items-baseline justify-between mb-1.5">
      <label class="text-sm text-muted">${label}</label>
      <span class="stat-num text-sm font-medium">${fmt ? fmt(value) : value}${suffix||''}</span>
    </div>
    <input type="range" class="slider" min=${min} max=${max} step=${step} value=${value}
           onChange=${e=>setValue(parseFloat(e.target.value))} />
  </div>`;

const Tab = ({ active, onClick, children }) => html`
  <button onClick=${onClick}
    class="px-4 py-2 rounded-lg text-sm font-medium transition
           ${active ? 'bg-panel2 text-white' : 'text-muted hover:text-white'}">
    ${children}
  </button>`;

const Tip = ({ active, payload }) => {
  if (!active || !payload?.length) return null;
  return html`<div class="card-inset px-3 py-2 text-xs">
    ${payload.map(p => html`<div key=${p.dataKey}><span class="text-muted">${p.name}:</span> <span class="stat-num">${typeof p.value==='number' ? p.value.toLocaleString(undefined,{maximumFractionDigits:2}) : p.value}</span></div>`)}
  </div>`;
};

                <defs>

}
